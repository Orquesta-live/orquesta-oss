services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: "file:/app/data/orquesta.db"
      # Required — no default on purpose. A fallback baked into this file would
      # be a session-signing secret that is public in the repo, so `up` fails
      # fast instead. Generate one with: openssl rand -base64 32
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?required — generate one with: openssl rand -base64 32}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      PORT: "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/get-session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# Zero extra services.
# SQLite lives in ./data/.
# Swap DATABASE_URL to postgresql://... for Postgres (add a postgres service if needed).
